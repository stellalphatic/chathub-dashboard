# docker compose -f docker-compose.prod.yml up -d
#
# EC2 side of the stack. Amplify hosts the Next.js web app; this file only
# runs the dependencies and workers that the web app talks to:
#   - redis: BullMQ queue + shared bot-config cache
#   - qdrant: vector store for RAG
#   - worker: BullMQ consumers (inbound-message, llm-reply, outbound-send,
#             media-archive, voice-transcribe, embed-document,
#             scheduled-ticker, broadcast-runner)
#
# Postgres is NOT here — use Supabase.
#
# Redis + Qdrant are exposed on 0.0.0.0 so Amplify can reach them via the
# instance's Elastic IP. They are protected by:
#   - REDIS_PASSWORD (required, URL-safe alphanumeric)
#   - QDRANT_API_KEY (required)
#   - the EC2 security group (lock these ports to known IPs when possible)
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env.production (use alphanumeric only — no / + = @)}"
      - "--appendonly"
      - "yes"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - redis-data:/data
    ports:
      - "0.0.0.0:6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY must be set in .env.production}
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "0.0.0.0:6333:6333"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env.production
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - redis
      - qdrant
    # Scale: `docker compose up -d --scale worker=3`
    deploy:
      replicas: 2

volumes:
  redis-data:
  qdrant-data:
