version: 1
# Amplify build spec for Next.js 15. This file ensures:
#   - NEXT_PUBLIC_* environment variables from the Amplify console are
#     written into .env.production *before* `next build`, so they end up
#     in the client bundle (Clerk publishable key, etc.).
#   - Server-only envs (DATABASE_URL, CLERK_SECRET_KEY, etc.) are also
#     piped through for the server runtime. Amplify already injects them
#     into the Lambda environment, but duplicating them here guarantees
#     they're visible to `next build` (used by generateStaticParams, etc.).
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm ci --no-audit --no-fund
        - echo "Piping env vars from Amplify console into .env.production"
        - |
          # Only pipe vars we explicitly trust — do NOT pipe AWS_* (Amplify rejects those anyway).
          for key in \
            DATABASE_URL \
            NEXT_PUBLIC_APP_URL \
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY \
            NEXT_PUBLIC_CLERK_SIGN_IN_URL \
            NEXT_PUBLIC_CLERK_SIGN_UP_URL \
            NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL \
            NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL \
            CLERK_SECRET_KEY \
            CHATHUB_PLATFORM_ADMIN_EMAILS \
            ENCRYPTION_KEY \
            REDIS_URL \
            QDRANT_URL \
            QDRANT_API_KEY \
            S3_REGION \
            S3_BUCKET \
            S3_ACCESS_KEY_ID \
            S3_SECRET_ACCESS_KEY \
            META_APP_SECRET \
            META_VERIFY_TOKEN \
            YCLOUD_WEBHOOK_SECRET \
            MANYCHAT_WEBHOOK_SECRET; do
            value="${!key}"
            if [ -n "$value" ]; then
              echo "$key=$value" >> .env.production
            fi
          done
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
